<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Depositar Dinero</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/deposit.css">
   
</head>

<body>

    <div class="container-deposit">
        <i class="fas fa-hand-holding-usd deposit-icon"></i>
        <h2>Depositar Dinero</h2>
        
        <div class="amount-preview">
            El monto se acreditará instantáneamente en tu cuenta.
        </div>

        <div id="liveAlertPlaceholder"></div>
        <form id="depositForm">
            <div class="form-group">
                <label for="depositAmount">Monto a depositar:</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">$</span>
                    </div>
                    <input
                        type="number"
                        class="form-control"
                        id="depositAmount"
                        placeholder="0.00"
                        required
                        min="1"
                        step="0.01"
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-deposit">
                Confirmar Depósito <i class="fas fa-check-circle ml-2"></i>
            </button>
        </form>

        <a href="menu.html" class="btn btn-back">
            <i class="fas fa-arrow-left"></i> Volver al Menú Principal
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="./js/deposit.js"></script>

</body>
