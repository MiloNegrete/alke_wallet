<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Últimos Movimientos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/transactions.css">
</head>

<body>

    <div class="container-transactions">
        <h2><i class="fas fa-history mr-2" style="color: var(--accent-purple);"></i>Movimientos</h2>
        
        <div class="date-divider">Hoy</div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <div class="transaction-info">
                    <i class="fas fa-shopping-bag icon-expense"></i>
                    <span>Compra Tienda Online</span>
                </div>
                <span class="amount-expense"> -49.990</span>
            </li>

            <li class="list-group-item">
                <div class="transaction-info">
                    <i class="fas fa-arrow-down icon-income"></i>
                    <span>Depósito recibido</span>
                </div>
                <span class="amount-income">+$100.000</span>
            </li>
        </ul>

        <div class="date-divider">Ayer</div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <div class="transaction-info">
                    <i class="fas fa-coffee icon-expense"></i>
                    <span>Starbucks Coffee</span>
                </div>
                <span class="amount-expense"> -12.500</span>
            </li>

            <li class="list-group-item">
                <div class="transaction-info">
                    <i class="fas fa-user-friends icon-income"></i>
                    <span>Transferencia Rosita</span>
                </div>
                <span class="amount-income">+$22.000</span>
            </li>
        </ul>

        <a href="menu.html" class="btn btn-back">
            <i class="fas fa-chevron-left mr-2"></i>Volver al Menú Principal
        </a>
    </div>
    <script src="./js/transactions.js"></script>
</body>
</html>
