<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Menú Principal</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/menu.css">
</head>
<body>

    <div class="container-menu">
        <div class="menu-header">

                <i class="fas fa-wallet fa-lg"></i>
            </div>
            <h1>Alke Wallet</h1>
        </div>

        <div class="balance-card">
            <small>Saldo disponible</small>

        </div>

        <div class="menu-options">
            <a href="deposit.html" class="menu-btn">
                <i class="fas fa-hand-holding-usd"></i>
                <span>Depositar</span>
            </a>
            <a href="sendmoney.html" class="menu-btn">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar dinero</span>
            </a>
            <a href="transactions.html" class="menu-btn">
                <i class="fas fa-history"></i>
                <span>Movimientos</span>
            </a>
        </div>

        <a href="index.html" class="btn-logout" id="btnLogout">
            <i class="fas fa-sign-out-alt mr-2"></i>Cerrar sesión
        </a>
    </div>

    <script src="./js/menu.js"></script>

</html>
